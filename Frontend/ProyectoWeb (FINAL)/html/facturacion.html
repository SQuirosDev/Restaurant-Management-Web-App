    <section class="section-primary">
        <div class="container-title">
            <h1>Datos</h1>
            <h2>Para realizar facturacion</h2>
        </div>
    </section>
    <div class="separador"></div>

    <section class="section-primary-factura text-white">
        <div class="container">
            <h2 id="textInicial">Generar Factura</h2>
            <form id="facturaForm">
                <!-- Nombre del Cliente -->
                <!-- cambiar nombre por numero de mesa -->
                <div class="mb-3">
                    <label for="numeroMesa" class="form-label">Numero de mesa</label>
                    <input type="number" id="numeroMesa" class="form-control"placeholder="Ingrese el número de mesa">
                </div>
                <!-- Lista de Platillos y Precios-->
                <div class="mb-3">
                    <label for="listaAlimentos" class="form-label">Lista de platillos</label>
                    <textarea id="listaAlimentos" class="form-control" rows="5"
                        placeholder="Ejemplo: Hamburguesa"></textarea>
                </div>
                <div class="mb-3">
                    <label for="listaPrecios" class="form-label">Lista de precios</label>
                    <textarea id="listaPrecios" class="form-control" rows="5"
                        placeholder="Ejemplo: 100$"></textarea>
                </div>
                <!-- Botón de Facturar -->
                <div class="text-center">
                    <button type="button" id="facturarBtn" onclick="insertarFactura()" class="btn">FACTURAR</button>
                </div>
            </form>
        </div>
    </section>
    <div id="facturaActual"class="factura total mt-4">
        <!--Info-->
    </div>
    <!--Mostrar Factura-->
    <div class="eventoMostrarFactura" id="eventoMostrar">
        <div>
            <h3>Lista de facturas</h3>
            <button type="button" class="view-btn" onclick="obtenerFactura()">Obtener</button>
            <div class="mostrarFacturar" id="verFacturas"></div>
        </div>
    </div>
